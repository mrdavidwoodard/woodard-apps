{% extends "base.html" %}

{% block title %}Login | Woodard Apps{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-md-6 col-lg-4">
    <div class="text-center mb-3">
      <div class="brand-mark mx-auto mb-2">WA</div>
      <h1 class="h3 mb-1">Woodard Apps</h1>
      <p class="text-muted mb-0">Sign in to continue.</p>
    </div>
    <div class="card">
      <div class="card-body">
        <form method="post" action="{{ url_for('auth.login', next=request.args.get('next')) }}">
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input class="form-control" id="email" name="email" type="email" value="{{ email or '' }}" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Password</label>
            <input class="form-control" id="password" name="password" type="password" required>
          </div>
          <button class="btn btn-primary w-100" type="submit">Login</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
